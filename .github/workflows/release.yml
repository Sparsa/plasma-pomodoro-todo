name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ────────────────────────────────────────────────────
  # Android APK
  # ────────────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Prepare signing keystore
        env:
          ANDROID_KEYSTORE_BASE64:   ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret not set — APK will be debug-signed."
            exit 0
          fi

          # Decode the base64 secret to a raw keystore file.
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > /tmp/raw_keystore.jks

          # Convert to legacy JKS format so AGP's Bouncy Castle can parse it.
          # Java 17+ defaults to PKCS12, which produces ASN.1 tags >30 that
          # older Bouncy Castle (bundled with AGP) cannot read.
          keytool -importkeystore \
            -srckeystore  /tmp/raw_keystore.jks \
            -srcstorepass "$ANDROID_KEYSTORE_PASSWORD" \
            -srcalias     "$ANDROID_KEY_ALIAS" \
            -destkeystore /tmp/release.jks \
            -deststoretype JKS \
            -deststorepass "$ANDROID_KEYSTORE_PASSWORD" \
            -destalias    "$ANDROID_KEY_ALIAS" \
            -noprompt

          echo "ANDROID_KEYSTORE_PATH=/tmp/release.jks" >> "$GITHUB_ENV"

      - name: Build APK
        run: flutter build apk --release --split-per-abi
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}

      - uses: actions/upload-artifact@v6
        with:
          name: android-apks
          path: mobile/build/app/outputs/flutter-apk/*.apk

  # ────────────────────────────────────────────────────
  # Linux AppImage
  # ────────────────────────────────────────────────────
  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Linux build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev wget

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package as AppImage
        run: |
          APP_DIR="AppDir"
          BUILD="build/linux/x64/release/bundle"

          mkdir -p "$APP_DIR/usr/bin"
          mkdir -p "$APP_DIR/usr/share/icons/hicolor/256x256/apps"

          # Copy entire Flutter bundle — data/ and lib/ must stay next to the executable
          cp -r "$BUILD"/. "$APP_DIR/usr/bin/"

          # Desktop file written with echo to avoid YAML-indentation leading-space problem
          # (appimagetool rejects desktop files with leading whitespace)
          {
            echo '[Desktop Entry]'
            echo 'Name=Pomodoro Todo'
            echo 'Exec=pomodoro_todo'
            echo 'Icon=pomodoro_todo'
            echo 'Type=Application'
            echo 'Categories=Utility;'
          } > "$APP_DIR/pomodoro_todo.desktop"

          # Icon
          if [ -f "../contents/images/plasma-pomodoro-todo.png" ]; then
            cp ../contents/images/plasma-pomodoro-todo.png \
               "$APP_DIR/usr/share/icons/hicolor/256x256/apps/pomodoro_todo.png"
            cp ../contents/images/plasma-pomodoro-todo.png "$APP_DIR/pomodoro_todo.png"
          else
            # Valid 1×1 transparent PNG
            python3 -c "
          import base64
          open('$APP_DIR/pomodoro_todo.png','wb').write(base64.b64decode(
            'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12NgAAIABQAABjE+ibYAAAAASUVORK5CYII='
          ))"
          fi

          # AppRun — LD_LIBRARY_PATH must point to lib/ inside the bundle (usr/bin/lib/)
          {
            echo '#!/bin/bash'
            echo 'HERE="$(dirname "$(readlink -f "${0}")")"'
            echo 'export LD_LIBRARY_PATH="$HERE/usr/bin/lib:$LD_LIBRARY_PATH"'
            echo 'exec "$HERE/usr/bin/pomodoro_todo" "$@"'
          } > "$APP_DIR/AppRun"
          chmod +x "$APP_DIR/AppRun"

          wget -q \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool

          # APPIMAGE_EXTRACT_AND_RUN=1 avoids needing FUSE on GitHub-hosted runners
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool \
            "$APP_DIR" "PomodoroTodo-${{ github.ref_name }}-x86_64.AppImage"

      - uses: actions/upload-artifact@v6
        with:
          name: linux-appimage
          path: mobile/PomodoroTodo-*.AppImage

  # ────────────────────────────────────────────────────
  # macOS .dmg
  # ────────────────────────────────────────────────────
  macos:
    name: macOS DMG
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build macos --release

      - name: Create DMG
        run: |
          APP="build/macos/Build/Products/Release/pomodoro_todo.app"
          DMG="PomodoroTodo-${{ github.ref_name }}-macOS.dmg"
          hdiutil create -volname "PomodoroTodo" \
            -srcfolder "$APP" \
            -ov -format UDZO "$DMG"

      - uses: actions/upload-artifact@v6
        with:
          name: macos-dmg
          path: mobile/PomodoroTodo-*.dmg

  # ────────────────────────────────────────────────────
  # iOS unsigned IPA
  # ────────────────────────────────────────────────────
  ios:
    name: iOS IPA (unsigned)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build unsigned IPA
        run: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r "../../../PomodoroTodo-${{ github.ref_name }}-ios-unsigned.ipa" Payload/

      - uses: actions/upload-artifact@v6
        with:
          name: ios-ipa
          path: mobile/PomodoroTodo-*.ipa

  # ────────────────────────────────────────────────────
  # Windows ZIP
  # ────────────────────────────────────────────────────
  windows:
    name: Windows ZIP
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package as ZIP
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          $zip = "PomodoroTodo-${{ github.ref_name }}-windows.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $zip

      - uses: actions/upload-artifact@v6
        with:
          name: windows-zip
          path: mobile/PomodoroTodo-*.zip

  # ────────────────────────────────────────────────────
  # GitHub Release
  # Runs even if individual build jobs fail so you still
  # get a release with whatever artifacts succeeded.
  # ────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [android, linux, macos, ios, windows]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: List collected artifacts
        run: find dist -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: dist/**
